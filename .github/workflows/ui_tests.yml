name: UI Tests

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  ui-test-android:
    name: Android UI Tests (Emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Android UI Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          script: ./gradlew :composeApp:connectedDebugAndroidTest

  ui-test-web:
    name: Web UI Tests (Headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Run Web Tests (Headless)
        run: ./gradlew :composeApp:wasmJsBrowserTest
        # Note: For full UI testing with Selenium/Playwright, additional setup would be required.

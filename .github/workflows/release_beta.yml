name: Beta Release

on:
  workflow_run:
    workflows: ["Beta Tag"]
    types: [completed]

jobs:
  buildAAB:
    name: Build Signed Beta AAB
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - name: Build .AAB
        run: ./gradlew :composeApp:bundleRelease
      - name: Sign Android Release
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: composeApp/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
      - name: Upload app AAB artifact
        uses: actions/upload-artifact@v6
        with:
          name: app-beta-aab
          path: ${{ env.SIGNED_RELEASE_FILE }}

  uploadToPlayStore:
    name: Upload AAB to Google Play
    runs-on: ubuntu-latest
    needs: buildAAB
    steps:
      - uses: actions/checkout@v6
      - name: Download app AAB
        uses: actions/download-artifact@v8
        with:
          name: app-beta-aab
      - name: Upload to Play Store (Internal)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.ptut.portfolio
          releaseFiles: ./*.aab
          track: internal
          status: 'draft'

# TODO: Production Release Pipeline
# Triggered on merge to master. Should:
# 1. Build signed Android AAB and deploy to Google Play Store (production track)
# 2. Build Desktop distributions (DMG/MSI/DEB) and create GitHub Release with assets
# 3. Build Web (Wasm) and deploy to Firebase Hosting (prod project)
# 4. Build iOS .ipa, sign, and deploy to App Store Connect / TestFlight
# 5. Create a Git tag with the version number
# All builds use -Pflavor=prod

name: Release Production

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      versionName:
        description: 'Release Version Name (Major.Minor.Patch, e.g., 1.2.3)'
        required: true

jobs:
  build-android:
    name: Build Signed Android AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Update build version
        if: inputs.versionName != ''
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ inputs.versionName }}"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          sed -i "s/versionMajor=.*/versionMajor=$MAJOR/" gradle.properties
          sed -i "s/versionMinor=.*/versionMinor=$MINOR/" gradle.properties
          sed -i "s/versionPatch=.*/versionPatch=$PATCH/" gradle.properties
          echo "Computed versionCode: $VERSION_CODE for ${{ inputs.versionName }}"
      - name: Set up Google Services JSON
        run: echo "${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON_PROD }}" | base64 -d > composeApp/google-services.json
      - name: Build Signed .AAB
        run: ./gradlew :composeApp:bundleRelease -Pflavor=prod
      - name: Sign Android Release
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: composeApp/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
      - name: Upload app AAB
        uses: actions/upload-artifact@v6
        with:
          name: android-release-aab
          path: ${{ env.SIGNED_RELEASE_FILE }}
      # TODO: Upload to Google Play Store (production track)
      # - name: Upload to Play Store
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
      #     packageName: com.ptut.portfolio
      #     releaseFiles: ${{ env.SIGNED_RELEASE_FILE }}
      #     track: production
      #     status: 'completed'

  build-desktop:
    name: Build Desktop Distributions
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Update build version
        if: inputs.versionName != ''
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ inputs.versionName }}"
          sed -i '' "s/versionMajor=.*/versionMajor=$MAJOR/" gradle.properties
          sed -i '' "s/versionMinor=.*/versionMinor=$MINOR/" gradle.properties
          sed -i '' "s/versionPatch=.*/versionPatch=$PATCH/" gradle.properties
      - name: Build Desktop (DMG/PKG)
        run: ./gradlew :composeApp:packageReleaseDistributionForCurrentOS -Pflavor=prod
      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-distributions
          path: composeApp/build/compose/binaries/main/
      # TODO: Create GitHub Release with desktop artifacts
      # - name: Create GitHub Release
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     tag_name: v${{ inputs.versionName }}
      #     files: composeApp/build/compose/binaries/main/dmg/*.dmg

  build-web:
    name: Build & Deploy Web Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Update build version
        if: inputs.versionName != ''
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ inputs.versionName }}"
          sed -i "s/versionMajor=.*/versionMajor=$MAJOR/" gradle.properties
          sed -i "s/versionMinor=.*/versionMinor=$MINOR/" gradle.properties
          sed -i "s/versionPatch=.*/versionPatch=$PATCH/" gradle.properties
      - name: Build Web (Wasm/JS)
        run: ./gradlew :composeApp:wasmJsBrowserDistribution -Pflavor=prod
      - name: Upload Web Distribution
        uses: actions/upload-artifact@v6
        with:
          name: web-production-bundle
          path: composeApp/build/dist/wasmJs/productionExecutable/
      # TODO: Deploy to Firebase Hosting (prod)
      # - name: Deploy to Firebase Hosting
      #   uses: FirebaseExtended/action-hosting-deploy@v0
      #   with:
      #     repoToken: "${{ secrets.GITHUB_TOKEN }}"
      #     firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_PROD }}"
      #     projectId: "${{ secrets.FIREBASE_PROJECT_ID_PROD }}"
      #     channelId: live

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Cache Kotlin Native (Konan)
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Update build version
        if: inputs.versionName != ''
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ inputs.versionName }}"
          sed -i '' "s/versionMajor=.*/versionMajor=$MAJOR/" gradle.properties
          sed -i '' "s/versionMinor=.*/versionMinor=$MINOR/" gradle.properties
          sed -i '' "s/versionPatch=.*/versionPatch=$PATCH/" gradle.properties
      - name: Build iOS Framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 -Pflavor=prod

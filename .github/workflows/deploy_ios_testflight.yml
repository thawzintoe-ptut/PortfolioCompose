name: iOS TestFlight Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+-RC[0-9]+' # Trigger on beta tags (e.g., 1.0.1-RC1)

jobs:
  build-ios:
    name: Build and Upload to TestFlight
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Cache Kotlin Native (Konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}

      - name: Build iOS Framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64

      # Full iOS build and upload requires P12 and Mobile Provisioning Profile in Secrets
      # Using standard fastlane/ios-build-action setup (Placeholder for your secrets)
      - name: Build and Sign IPA
        uses: yukiarrr/ios-build-action@v1.5.0
        with:
          project-path: iosApp/iosApp.xcodeproj
          p12-base64: ${{ secrets.IOS_P12_BASE64 }}
          mobileprovision-base64: ${{ secrets.IOS_MOBILE_PROVISION_BASE64 }}
          code-signing-identity: "Apple Distribution"
          team-id: ${{ secrets.IOS_TEAM_ID }}
          workspace-path: iosApp/iosApp.xcworkspace # optional

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app -t ios -f build/ios/ipa/*.ipa \
            -u "${{ secrets.APPLE_ID }}" -p "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"

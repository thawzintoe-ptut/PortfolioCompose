name: Production Tag

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  updateVersions:
    name: Generate Production Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Update build versions
        run: |
          currentTag="${GITHUB_REF#refs/tags/}"
          sed -i "0,/versionName/{s/versionName = .*/versionName = \"${currentTag}\"/"} composeApp/build.gradle.kts
          
          currentCode=$(grep "versionCode =" composeApp/build.gradle.kts | head -1 | awk -F'=' '{print $2}' | tr -d ' ')
          newCode=$((currentCode + 1))
          sed -i "0,/versionCode/{s/versionCode = .*/versionCode = ${newCode}/}" composeApp/build.gradle.kts
      - name: Commit & Push changes
        uses: actions-js/push@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: "chore: bump production version"

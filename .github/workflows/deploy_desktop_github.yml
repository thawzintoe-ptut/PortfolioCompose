name: Desktop Production Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+' # Trigger on production tags (e.g., 1.0.1)

jobs:
  build-desktop:
    name: Build Native Distributions
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'
          cache: 'gradle'

      - name: Build Desktop Distribution
        run: ./gradlew :composeApp:packageReleaseDistributionForCurrentOS

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            composeApp/build/compose/binaries/main/dmg/*.dmg
            composeApp/build/compose/binaries/main/msi/*.msi
            composeApp/build/compose/binaries/main/deb/*.deb
          token: ${{ secrets.GITHUB_TOKEN }}

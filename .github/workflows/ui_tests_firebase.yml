name: UI Tests Firebase

on:
  workflow_dispatch:

jobs:
  generateTestAPK:
    name: Generate APKs for UI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - name: Assemble app debug APK
        run: ./gradlew :composeApp:assembleDebug
      - name: Upload app APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: composeApp/build/outputs/apk/debug/composeApp-debug.apk

      - name: Assemble Android Instrumentation Tests
        run: ./gradlew :composeApp:assembleAndroidTest
      - name: Upload Android Test APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-androidTest
          path: composeApp/build/outputs/apk/androidTest/debug/composeApp-debug-androidTest.apk

  firebase:
    name: Run UI tests on Firebase Test Lab
    needs: generateTestAPK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download app APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
      - name: Download Android test APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-androidTest
      - uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCLOUD_AUTH }}'
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'
      - name: Set current project
        run: gcloud config set project ${{ secrets.FIREBASE_PROJECT_ID }}
      - name: Run Instrumentation Tests in Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app composeApp-debug.apk \
            --test composeApp-debug-androidTest.apk \
            --device model=Nexus6P,version=26,locale=en,orientation=portrait

name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  validate-common:
    name: Validate Common Logic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Run Common Unit Tests
        run: ./gradlew :composeApp:allTests

  check-android:
    name: Android Checks
    needs: validate-common
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Assemble Debug APK
        run: ./gradlew :composeApp:assembleDebug

  check-ios:
    name: iOS Checks
    needs: validate-common
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Cache Kotlin Native (Konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Build iOS Framework
        run: ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode

  check-desktop-web:
    name: Desktop & Web Checks
    needs: validate-common
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Build Desktop (JVM)
        run: ./gradlew :composeApp:jvmProcessResources
      - name: Build Web (Wasm)
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

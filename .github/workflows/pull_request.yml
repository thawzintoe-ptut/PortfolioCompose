name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  validate-common:
    name: Common Logic Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'
          cache: 'gradle'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Common Unit Tests
        run: ./gradlew :composeApp:allTests

  check-android:
    name: Android Build Verification
    needs: validate-common
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'
          cache: 'gradle'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug

  check-ios:
    name: iOS Build Verification
    needs: validate-common
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'
          cache: 'gradle'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cache Kotlin Native
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
      - name: Compile iOS Framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64

  check-desktop:
    name: Desktop Build Verification
    needs: validate-common
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'
          cache: 'gradle'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build JVM Resources
        run: ./gradlew :composeApp:jvmProcessResources

  check-web:
    name: Web Build Verification
    needs: validate-common
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'
          cache: 'gradle'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Web (Wasm)
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

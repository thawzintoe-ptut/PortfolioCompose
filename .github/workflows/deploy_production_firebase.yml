name: Deploy to Firebase Distribution

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Build flavor'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  FLAVOR: ${{ inputs.flavor || 'prod' }}

jobs:
  build_aab:
    name: Build AAB (${{ inputs.flavor || 'prod' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'
      - name: Set up Google Services JSON
        env:
          GS_DEV: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON_DEV }}
          GS_STAGING: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON_STAGING }}
          GS_PROD: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON_PROD }}
        run: |
          case "${{ env.FLAVOR }}" in
            dev)     echo "$GS_DEV" | base64 -d > composeApp/google-services.json ;;
            staging) echo "$GS_STAGING" | base64 -d > composeApp/google-services.json ;;
            prod)    echo "$GS_PROD" | base64 -d > composeApp/google-services.json ;;
          esac
      - name: Build release AAB
        run: ./gradlew :composeApp:bundleRelease -Pflavor=${{ env.FLAVOR }}
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v6
        with:
          name: app-${{ env.FLAVOR }}-release-aab
          path: composeApp/build/outputs/bundle/release/

  deploy_to_firebase:
    name: Deploy to Firebase (${{ inputs.flavor || 'prod' }})
    runs-on: ubuntu-latest
    needs: build_aab
    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v8
        with:
          name: app-${{ env.FLAVOR }}-release-aab
      - name: Set flavor-specific Firebase config
        id: firebase
        env:
          APP_ID_DEV: ${{ secrets.FIREBASE_ANDROID_APP_ID_DEV }}
          APP_ID_STAGING: ${{ secrets.FIREBASE_ANDROID_APP_ID_STAGING }}
          APP_ID_PROD: ${{ secrets.FIREBASE_ANDROID_APP_ID_PROD }}
          CRED_DEV: ${{ secrets.FIREBASE_DISTRIBUTION_CREDENTIAL_JSON_DEV }}
          CRED_STAGING: ${{ secrets.FIREBASE_DISTRIBUTION_CREDENTIAL_JSON_STAGING }}
          CRED_PROD: ${{ secrets.FIREBASE_DISTRIBUTION_CREDENTIAL_JSON_PROD }}
        run: |
          case "${{ env.FLAVOR }}" in
            dev)     echo "app_id=$APP_ID_DEV" >> $GITHUB_OUTPUT; echo "cred=$CRED_DEV" >> $GITHUB_OUTPUT ;;
            staging) echo "app_id=$APP_ID_STAGING" >> $GITHUB_OUTPUT; echo "cred=$CRED_STAGING" >> $GITHUB_OUTPUT ;;
            prod)    echo "app_id=$APP_ID_PROD" >> $GITHUB_OUTPUT; echo "cred=$CRED_PROD" >> $GITHUB_OUTPUT ;;
          esac
      - name: Deploy to Firebase Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1.7.1
        with:
          appId: ${{ steps.firebase.outputs.app_id }}
          serviceCredentialsFileContent: ${{ steps.firebase.outputs.cred }}
          groups: testers
          file: composeApp-release.aab

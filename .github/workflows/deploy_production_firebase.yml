name: Deploy Production Build to Firebase

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  update_versions:
    name: Update Bump Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Update build version
        run: |
          latestTag="$(git tag --sort=-creatordate | head -1 || echo "1.0.0")"
          sed -i "0,/versionName/{s/versionName = .*/versionName = \"${latestTag}\"/"} composeApp/build.gradle.kts
          
          currentCode=$(grep "versionCode =" composeApp/build.gradle.kts | head -1 | awk -F'=' '{print $2}' | tr -d ' ')
          newCode=$((currentCode + 1))
          sed -i "0,/versionCode/{s/versionCode = .*/versionCode = ${newCode}/}" composeApp/build.gradle.kts
      - name: Commit & Push changes
        uses: actions-js/push@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: "chore: bump version code"

  build_aab:
    name: Build Production AAB
    runs-on: ubuntu-latest
    needs: update_versions
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
      - name: Set up Google Services JSON
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: |
          echo $FIREBASE_GOOGLE_SERVICES_JSON | base64 -d > composeApp/google-services.json || echo $FIREBASE_GOOGLE_SERVICES_JSON > composeApp/google-services.json
      - name: Build release AAB
        run: ./gradlew :composeApp:bundleRelease

  deploy_to_firebase:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: build_aab
    steps:
      - name: Deploy Android Production to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1.5.0
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_DISTRIBUTION_CREDENTIAL_JSON }}
          groups: testers
          file: composeApp/build/outputs/bundle/release/composeApp-release.aab
